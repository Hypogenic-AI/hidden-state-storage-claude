idea:
  title: How much can you store in a hidden state?
  domain: nlp
  hypothesis: 'The amount of information that can be stored in a hidden state varies
    depending on the encoding scheme, such as ASCII encoding, LLM vocabulary encoding,
    encoding via fixed vector walks (where magnitude and direction encode token and
    position), use of unembeddings, or using a Transformer layer as a decoder.

    '
  background:
    description: 'How much can you store in a hidden state if you encode things in
      ascii?

      What about if you use an LLM vocab?

      What if you encode things through a fixed walk where the magnitude of the vector
      reads off a token and the direction tells you the position?

      What if you can use the unembeddings?

      What if you can use one layer of the Transformer as a decoder?

      '
  metadata:
